name: Security

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main, "feature/**"]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (tracked keys)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check for committed private keys
        run: ./avalanchego/scripts/check-secrets.sh

  gosec:
    name: gosec scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.9"
      # Scope: cmd/titan only (operator CLI). Exclude avalanchego/coreth upstream —
      # expand incrementally after triaging legacy findings in forked modules.
      - name: Run gosec (HIGH severity, HIGH confidence)
        uses: securego/gosec@v2.27.1
        with:
          args: "-severity high -confidence high -fmt sarif -out gosec.sarif ./avalanchego/cmd/titan/..."
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: >-
          always() &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: gosec.sarif

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    continue-on-error: true # informational until Go/stdlib + otel dependency bumps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.9"
          cache-dependency-path: avalanchego/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan cmd/titan
        run: |
          cd avalanchego
          govulncheck ./cmd/titan/...

  trivy:
    name: Trivy image scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      # Policy: OS packages only (vuln-type: os). Fails CI on unfixed CRITICAL/HIGH in the
      # base image. Library scan is intentionally omitted here — enable separately with
      # vuln-type: library and exit-code: 0 for informational reporting if desired.
      - name: Build image for scanning
        run: docker build -t go-titan:scan -f Dockerfile .
      - name: Run Trivy (OS packages)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: go-titan:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os