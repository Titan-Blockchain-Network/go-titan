name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-titan-cli:
    name: Titan CLI tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.9"
          cache-dependency-path: avalanchego/go.sum
      - name: Install jq (test runner JSON formatter)
        run: sudo apt-get update -y && sudo apt-get install -y jq
      - name: Run titan CLI tests (feature suite)
        working-directory: avalanchego
        run: ./scripts/test-titan.sh --sequential
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: titan-test-log
          path: avalanchego/test-results/latest.log
          if-no-files-found: ignore

  lint:
    name: golangci-lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.9"
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          working-directory: avalanchego
          args: --timeout=10m ./cmd/titan/...

  build:
    name: Build binaries
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.9"
          cache-dependency-path: avalanchego/go.sum
      - name: Build titan + avalanchego
        working-directory: avalanchego
        run: ./scripts/build-titan.sh
      - name: Verify binaries exist
        run: |
          test -f avalanchego/build/titan
          test -f avalanchego/build/avalanchego